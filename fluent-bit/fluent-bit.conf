[SERVICE]
    Flush             5
    Log_Level         info
    Parsers_File      /fluent-bit/etc/parsers.conf
    HTTP_Server       On
    HTTP_Listen       0.0.0.0
    HTTP_Port         2020
    storage.path      /tmp/flb-storage/
    storage.sync      normal
    storage.checksum  off
    storage.max_chunks_up 128

# ── Main application logs (LogstashEncoder JSON) ──
[INPUT]
    Name              tail
    Path              /logs/*.log
    Tag               app.*
    Read_from_Head    True
    Refresh_Interval  5
    Parser            json
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    DB                /tmp/flb_app.db
    Buffer_Chunk_Size 512k
    Buffer_Max_Size   2MB

# ── Send to OpenSearch ──
[OUTPUT]
    Name                  opensearch
    Match                 app.*
    Host                  opensearch
    Port                  9200
    Index                 application-logs
    Suppress_Type_Name    On
    Retry_Limit           5
    Logstash_Format       On
    Logstash_Prefix       application-logs
    Logstash_DateFormat   %Y.%m.%d
    Generate_ID           On
    Write_Operation       create
    Net.keepalive         On
    Buffer_Size           10MB
    Workers               2

# ── Test execution logs (logback plain text) ──
[INPUT]
    Name              tail
    Path              /test-logs/test-execution.log
    Tag               test.*
    Read_from_Head    True
    Refresh_Interval  5
    Parser            test_execution_log
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    DB                /tmp/flb_test.db
    Buffer_Chunk_Size 512k
    Buffer_Max_Size   2MB

# ── Send test logs to OpenSearch (separate index) ──
[OUTPUT]
    Name                  opensearch
    Match                 test.*
    Host                  opensearch
    Port                  9200
    Index                 test-execution-logs
    Suppress_Type_Name    On
    Retry_Limit           5
    Logstash_Format       On
    Logstash_Prefix       test-execution-logs
    Logstash_DateFormat   %Y.%m.%d
    Generate_ID           On
    Write_Operation       create
    Net.keepalive         On
    Buffer_Size           10MB
    Workers               2
