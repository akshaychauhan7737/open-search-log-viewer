[SERVICE]
    Flush             1
    Log_Level         info
    Parsers_File      /fluent-bit/etc/parsers.conf
    HTTP_Server       On
    HTTP_Listen       0.0.0.0
    HTTP_Port         2020

# ── Main application logs (LogstashEncoder JSON) ──
[INPUT]
    Name              tail
    Path              /logs/*.log
    Tag               app.*
    Read_from_Head    True
    Refresh_Interval  2
    Parser            json
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /tmp/flb_app.db

# ── Send to OpenSearch ──
[OUTPUT]
    Name                  opensearch
    Match                 app.*
    Host                  opensearch
    Port                  9200
    Index                 application-logs
    Suppress_Type_Name    On
    Retry_Limit           5
    Logstash_Format       On
    Logstash_Prefix       application-logs
    Logstash_DateFormat   %Y.%m.%d
    Generate_ID           On
    Write_Operation       create
    Net.keepalive         On
